<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debt Management | DQAP</title>
  
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  
  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --p: #006994;
      --pd: #004A68;
      --pl: #E4F1FA;
      --bg: #F4F6FA;
      --card: #fff;
      --t1: #111;
      --t2: #666;
      --bd: rgba(0, 0, 0, 0.11);
      --bds: rgba(0, 0, 0, 0.22);
      --rad: 10px;
      --success: #3F704D;
    }
    
    body {
      font-family: 'DM Sans', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--t1);
      font-size: 13px;
    }
    
    .header {
      background: linear-gradient(135deg, var(--p), var(--pd));
      color: white;
      padding: 20px 24px;
      border-radius: var(--rad);
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .header-left h1 {
      font-size: 18px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .header-left p {
      font-size: 13px;
      opacity: 0.9;
    }
    
    .header-right {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    
    .logout-btn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    
    .logout-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
    }
    
    .login-card {
      background: var(--card);
      border-radius: var(--rad);
      padding: 40px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .login-header-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    
    .login-header h2 {
      font-size: 20px;
      color: var(--t1);
      margin-bottom: 8px;
    }
    
    .login-header p {
      color: var(--t2);
      font-size: 13px;
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: var(--t1);
      font-size: 12px;
    }
    
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--bds);
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      transition: all 0.2s;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: var(--p);
      box-shadow: 0 0 0 3px rgba(0, 105, 148, 0.1);
    }
    
    .login-btn {
      width: 100%;
      padding: 12px;
      background: var(--p);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .login-btn:hover {
      background: var(--pd);
    }
    
    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .login-error {
      color: #D32F2F;
      font-size: 12px;
      margin-top: 12px;
      padding: 10px;
      background: #FFEBEE;
      border-radius: 4px;
      display: none;
    }
    
    .credentials-hint {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--bd);
      font-size: 12px;
      color: var(--t2);
      text-align: center;
    }
    
    .credentials-list {
      margin-top: 12px;
      font-size: 11px;
      background: var(--bg);
      padding: 10px;
      border-radius: 4px;
      max-height: 200px;
      overflow-y: auto;
    }
    
    .credentials-list div {
      margin: 6px 0;
      padding: 4px 0;
      border-bottom: 1px solid var(--bds);
    }
    
    .credentials-list div:last-child {
      border-bottom: none;
    }
    
    .credentials-list strong {
      color: var(--p);
      font-weight: 600;
    }
    
    .content {
      padding: 20px 24px;
    }
    
    .user-info {
      font-size: 13px;
      color: var(--t2);
    }
    
    .user-info strong {
      color: var(--t1);
    }
    
    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--bd);
      border-top-color: var(--p);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="login-header">
      <div class="login-header-icon">💰</div>
      <h2>Debt Management</h2>
      <p>Team Collections Portal</p>
    </div>
    
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">Email or Name</label>
        <input type="text" id="email" placeholder="e.g., Updesh or updesh@dqap.in" required>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" required>
      </div>
      
      <button type="submit" class="login-btn" id="loginBtn">
        Sign In
      </button>
      
      <div class="login-error" id="loginError"></div>
    </form>
    
    <div class="credentials-hint">
      <strong>Demo Credentials:</strong>
      <div class="credentials-list" id="credentialsList"></div>
    </div>
  </div>
</div>

<div id="mainScreen" style="display: none;">
  <div class="header">
    <div class="header-left">
      <h1>💰 Debt Management</h1>
      <p>Track collections and team commitments</p>
    </div>
    <div class="header-right">
      <div class="user-info">
        <strong id="userName">User</strong> <span id="userRole"></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>
  </div>
  
  <div class="content">
    <p style="color: var(--t2);">✅ You are logged in and authenticated!</p>
    <p style="margin-top: 12px; color: var(--t2);">Debt Management interface is ready to use.</p>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// BUILT-IN CREDENTIALS (Can be customized)
// ═══════════════════════════════════════════════════════════════════════════

const USERS = {
  'updesh': { name: 'Updesh', role: 'Admin/CEO', password: 'updesh123' },
  'pratim': { name: 'Pratim', role: 'Technical Admin', password: 'pratim123' },
  'dev': { name: 'Dev', role: 'CSV Upload', password: 'dev123' },
  'ravi': { name: 'Ravi', role: 'Collections', password: 'ravi123' },
  'jawed': { name: 'Jawed', role: 'Follow-up', password: 'jawed123' },
  'chetan': { name: 'Chetan', role: 'Sales', password: 'chetan123' },
  'keshav': { name: 'Keshav', role: 'Admin', password: 'keshav123' }
};

// Also allow login by email
const USER_EMAILS = {
  'updesh@dqap.in': 'updesh',
  'pratim@dqap.in': 'pratim',
  'dev@dqap.in': 'dev',
  'ravi@dqap.in': 'ravi',
  'jawed@dqap.in': 'jawed',
  'chetan@dqap.in': 'chetan',
  'keshav@dqap.in': 'keshav'
};

// ═══════════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════════

let currentUser = null;
let currentUserRole = null;

// ═══════════════════════════════════════════════════════════════════════════
// INITIALIZATION
// ═══════════════════════════════════════════════════════════════════════════

window.addEventListener('load', () => {
  // Display credentials hint
  displayCredentialsHint();
  
  // Check if user is already logged in (from localStorage)
  const savedUser = localStorage.getItem('debt_user');
  if (savedUser) {
    try {
      const user = JSON.parse(savedUser);
      currentUser = user.username;
      currentUserRole = user.role;
      showMainScreen();
      return;
    } catch (e) {
      localStorage.removeItem('debt_user');
    }
  }
  
  // Show login screen
  showLoginScreen();
});

// ═══════════════════════════════════════════════════════════════════════════
// LOGIN HANDLER
// ═══════════════════════════════════════════════════════════════════════════

function handleLogin(event) {
  event.preventDefault();
  
  const email = document.getElementById('email').value.toLowerCase().trim();
  const password = document.getElementById('password').value;
  const loginError = document.getElementById('loginError');
  const loginBtn = document.getElementById('loginBtn');
  
  // Clear previous errors
  loginError.style.display = 'none';
  loginBtn.disabled = true;
  loginBtn.innerHTML = '<span class="loading-spinner"></span> Signing in...';
  
  // Simulate network delay
  setTimeout(() => {
    // Look up user by name or email
    let username = null;
    
    if (email in USERS) {
      username = email;
    } else if (email in USER_EMAILS) {
      username = USER_EMAILS[email];
    }
    
    if (!username) {
      showLoginError('User not found. Check your email or name.');
      loginBtn.disabled = false;
      loginBtn.textContent = 'Sign In';
      return;
    }
    
    const user = USERS[username];
    
    // Check password
    if (password !== user.password) {
      showLoginError('Invalid password. Please try again.');
      loginBtn.disabled = false;
      loginBtn.textContent = 'Sign In';
      return;
    }
    
    // Success!
    currentUser = username;
    currentUserRole = user.role;
    
    // Save to localStorage
    localStorage.setItem('debt_user', JSON.stringify({
      username: username,
      name: user.name,
      role: user.role,
      loginTime: new Date().toISOString()
    }));
    
    // Show main screen
    showMainScreen();
  }, 800);
}

function showLoginError(message) {
  const loginError = document.getElementById('loginError');
  loginError.textContent = message;
  loginError.style.display = 'block';
}

// ═══════════════════════════════════════════════════════════════════════════
// SCREEN MANAGEMENT
// ═══════════════════════════════════════════════════════════════════════════

function showLoginScreen() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('mainScreen').style.display = 'none';
  document.getElementById('email').focus();
}

function showMainScreen() {
  const user = USERS[currentUser];
  document.getElementById('userName').textContent = user.name;
  document.getElementById('userRole').textContent = `(${user.role})`;
  
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainScreen').style.display = 'block';
}

// ═══════════════════════════════════════════════════════════════════════════
// LOGOUT
// ═══════════════════════════════════════════════════════════════════════════

function logout() {
  localStorage.removeItem('debt_user');
  currentUser = null;
  currentUserRole = null;
  showLoginScreen();
}

// ═══════════════════════════════════════════════════════════════════════════
// DISPLAY CREDENTIALS HINT
// ═══════════════════════════════════════════════════════════════════════════

function displayCredentialsHint() {
  const list = document.getElementById('credentialsList');
  
  Object.entries(USERS).forEach(([username, user]) => {
    const div = document.createElement('div');
    div.innerHTML = `<strong>${user.name}</strong>: ${username} / ${user.password}`;
    list.appendChild(div);
  });
}

</script>

</body>
</html>
