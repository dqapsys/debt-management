<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debt Management | DQAP</title>
  
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  
  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --p: #006994;
      --pd: #004A68;
      --pl: #E4F1FA;
      --bg: #F4F6FA;
      --card: #fff;
      --t1: #111;
      --t2: #666;
      --bd: rgba(0, 0, 0, 0.11);
      --bds: rgba(0, 0, 0, 0.22);
      --rad: 10px;
    }
    
    body {
      font-family: 'DM Sans', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--t1);
      font-size: 13px;
    }
    
    .header {
      background: linear-gradient(135deg, var(--p), var(--pd));
      color: white;
      padding: 20px 24px;
      border-radius: var(--rad);
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .header-left h1 {
      font-size: 18px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .header-left p {
      font-size: 13px;
      opacity: 0.9;
    }
    
    .header-right {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    
    .logout-btn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    
    .logout-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    
    .loading-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      text-align: center;
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--bd);
      border-top-color: var(--p);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .not-logged-in {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      text-align: center;
      flex-direction: column;
      gap: 16px;
    }
    
    .not-logged-in-icon {
      font-size: 48px;
      margin-bottom: 8px;
    }
    
    .not-logged-in h2 {
      font-size: 18px;
      color: var(--t1);
      margin-bottom: 8px;
    }
    
    .not-logged-in p {
      color: var(--t2);
      margin-bottom: 20px;
      max-width: 400px;
    }
    
    .btn {
      background: var(--p);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    
    .btn:hover {
      background: var(--pd);
    }
    
    .btn-secondary {
      background: transparent;
      border: 1px solid var(--bds);
      color: var(--t1);
      margin-left: 8px;
    }
    
    .btn-secondary:hover {
      background: var(--bg);
      border-color: var(--bd);
    }
    
    .content {
      padding: 20px 24px;
    }
    
    .user-info {
      font-size: 13px;
      color: var(--t2);
    }
    
    .user-info strong {
      color: var(--t1);
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>💰 Debt Management</h1>
    <p>Track collections and team commitments</p>
  </div>
  <div class="header-right">
    <div class="user-info">
      <strong id="userName">Loading...</strong> <span id="userRole"></span>
      <button class="logout-btn" onclick="logout()" style="display: none;" id="logoutBtn">Logout</button>
    </div>
  </div>
</div>

<div class="content">
  <!-- Loading State -->
  <div id="loadingScreen" class="loading-screen">
    <div class="spinner"></div>
    <div>Checking authentication...</div>
  </div>
  
  <!-- Not Logged In State -->
  <div id="notLoggedInScreen" class="not-logged-in" style="display: none;">
    <div class="not-logged-in-icon">🔐</div>
    <h2>Not Logged In</h2>
    <p>Please log in to the Wiki first, then return to access Debt Management.</p>
    <div>
      <button class="btn" onclick="goToWiki()">Go to Wiki</button>
      <button class="btn btn-secondary" onclick="retryAuth()">Retry</button>
    </div>
  </div>
  
  <!-- Main Content (loaded when authenticated) -->
  <div id="mainContent" style="display: none;">
    <p style="color: var(--t2); margin-bottom: 20px;">Debt Management interface loading...</p>
    <p>If you see this message, the app is initializing.</p>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// FIREBASE INITIALIZATION
// ═══════════════════════════════════════════════════════════════════════════

firebase.initializeApp({
  apiKey: "AIzaSyBV2ZQwfqvgPyzLz75wsSIg9N5gjPHY-R8",
  authDomain: "dqap-wiki.firebaseapp.com",
  projectId: "dqap-wiki",
  storageBucket: "dqap-wiki.firebasestorage.app",
  messagingSenderId: "932523956178",
  appId: "1:932523956178:web:cc83a8e7369eaa80649a0b"
});

const auth = firebase.auth();
const db = firebase.firestore();

// ═══════════════════════════════════════════════════════════════════════════
// GLOBAL STATE
// ═══════════════════════════════════════════════════════════════════════════

let currentUser = null;
let currentUserRole = null;
let authCheckTimeout = null;
let authCheckComplete = false;

// ═══════════════════════════════════════════════════════════════════════════
// AUTH STATE HANDLER - WITH PROPER LOADING AND TIMEOUT
// ═══════════════════════════════════════════════════════════════════════════

// Wait for auth with timeout
const AUTH_CHECK_TIMEOUT = 3000; // 3 seconds max wait

firebase.auth().onAuthStateChanged(async (user) => {
  clearTimeout(authCheckTimeout);
  authCheckComplete = true;
  
  const loadingScreen = document.getElementById('loadingScreen');
  const notLoggedInScreen = document.getElementById('notLoggedInScreen');
  const mainContent = document.getElementById('mainContent');
  const logoutBtn = document.getElementById('logoutBtn');
  
  if (user) {
    // ✅ USER IS LOGGED IN
    currentUser = user;
    
    try {
      // Get user role from dqap_users collection
      const userDoc = await db.collection('dqap_users').doc(user.email).get();
      if (userDoc.exists) {
        currentUserRole = userDoc.data().role || 'User';
      } else {
        currentUserRole = 'User';
      }
    } catch (err) {
      console.warn('Could not fetch user role:', err);
      currentUserRole = 'User';
    }
    
    // Update UI
    document.getElementById('userName').textContent = user.displayName || user.email.split('@')[0];
    document.getElementById('userRole').textContent = `(${currentUserRole})`;
    
    // Show logout button
    logoutBtn.style.display = 'block';
    
    // Hide loading, show content
    loadingScreen.style.display = 'none';
    notLoggedInScreen.style.display = 'none';
    mainContent.style.display = 'block';
    
    // Initialize app (placeholder for now)
    console.log('✅ User authenticated:', user.email, 'Role:', currentUserRole);
    
  } else {
    // ❌ USER NOT LOGGED IN
    loadingScreen.style.display = 'none';
    notLoggedInScreen.style.display = 'flex';
    mainContent.style.display = 'none';
    document.getElementById('logoutBtn').style.display = 'none';
    
    console.log('User not authenticated');
  }
});

// Set a timeout to show "Not logged in" if auth takes too long
authCheckTimeout = setTimeout(() => {
  if (!authCheckComplete && !currentUser) {
    const loadingScreen = document.getElementById('loadingScreen');
    const notLoggedInScreen = document.getElementById('notLoggedInScreen');
    
    if (loadingScreen.style.display !== 'none') {
      loadingScreen.style.display = 'none';
      notLoggedInScreen.style.display = 'flex';
    }
  }
}, AUTH_CHECK_TIMEOUT);

// ═══════════════════════════════════════════════════════════════════════════
// FUNCTIONS
// ═══════════════════════════════════════════════════════════════════════════

function logout() {
  firebase.auth().signOut().then(() => {
    window.location.href = 'https://dqapsys.github.io/dqap-wiki/';
  });
}

function goToWiki() {
  window.location.href = 'https://dqapsys.github.io/dqap-wiki/';
}

function retryAuth() {
  // Reload page to retry auth detection
  window.location.reload();
}

</script>

</body>
</html>
